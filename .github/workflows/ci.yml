name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    uses: ./.github/workflows/backend-build.yml
    secrets: inherit

  frontend:
    name: Frontend
    uses: ./.github/workflows/frontend-build.yml
    secrets: inherit